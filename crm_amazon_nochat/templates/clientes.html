<!DOCTYPE html>
<html>
<head>
    <title>Clientes - Zegucom</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .card h2 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #1e3a8a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        .clientes-list {
            list-style: none;
            padding: 0;
        }

        .clientes-list li {
            background: white;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.05);
        }

        .clientes-list strong {
            color: #1e3a8a;
        }

        .volver {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            padding: 10px 20px;
            background: #6b7280;
            color: white;
            border-radius: 6px;
            transition: 0.3s;
        }

        .volver:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>

<header>
    <h1>👥 Gestión de Clientes</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Registrar Nuevo Cliente</h2>
        <form method="POST">
            <input name="nombre" placeholder="Nombre completo" required>
            <input name="email" type="email" placeholder="Correo electrónico" required>
            <input name="telefono" placeholder="Teléfono">
            <input name="direccion" placeholder="Dirección">
            <button type="submit">Guardar Cliente</button>
        </form>
    </div>

    <div class="card">
        <h2>Lista de Clientes</h2>
        <ul class="clientes-list">
            {% for c in clientes %}
            <li>
                <strong>{{ c.nombre }}</strong><br>
                📧 {{ c.email }} <br>
                📞 {{ c.telefono }} <br>
                📍 {{ c.direccion }}
            </li>
            {% endfor %}
        </ul>
    </div>

    <a href="/dashboard" class="volver">⬅ Volver al Dashboard</a>

</div>

</body>
</html>
