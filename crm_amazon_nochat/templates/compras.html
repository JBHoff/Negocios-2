<!DOCTYPE html>
<html>
<head>
    <title>Compras - Zegucom</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .card h2 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #1e3a8a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        .compras-list {
            list-style: none;
            padding: 0;
        }

        .compras-list li {
            background: white;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.05);
        }

        .compras-list strong {
            color: #1e3a8a;
        }

        .precio {
            font-weight: bold;
            color: #16a34a;
        }

        .volver {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            padding: 10px 20px;
            background: #6b7280;
            color: white;
            border-radius: 6px;
            transition: 0.3s;
        }

        .volver:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>

<header>
    <h1>🛒 Gestión de Compras</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Registrar Nueva Compra</h2>
        <form method="POST">
            <input name="email" type="email" placeholder="Email del cliente" required>
            <input name="producto" placeholder="Producto" required>
            <input name="precio" placeholder="Precio (ej. 1500 o 1,500)" required>
            <button type="submit">Registrar Compra</button>
        </form>
    </div>

    <div class="card">
        <h2>Historial de Compras</h2>
        <ul class="compras-list">
            {% for c in compras %}
            <li>
                <strong>{{ c.producto }}</strong><br>
                📧 {{ c.cliente_email }} <br>
                💰 <span class="precio">${{ c.precio }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>

    <a href="/dashboard" class="volver">⬅ Volver al Dashboard</a>

</div>

</body>
</html>
