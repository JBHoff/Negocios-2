<!DOCTYPE html>
<html>
<head>
    <title>Portal Cliente - Zegucom</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #1e3a8a;
            color: white;
            padding: 30px 20px;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 40px;
        }

        .sidebar a {
            display: block;
            text-decoration: none;
            color: white;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #2563eb;
        }

        .content {
            flex: 1;
            padding: 50px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #1e3a8a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .success {
            color: green;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="layout">

    <div class="sidebar">
        <h3>👤 Cliente</h3>
        <a href="/portal_cliente">📝 Mis Datos</a>
        <a href="/login">📊 CRM</a>
    </div>

    <div class="content">

        <div class="card">
            <h2>Registro de Cliente</h2>

            {% if request.args.get('success') %}
                <p class="success">Datos enviados correctamente ✔</p>
            {% endif %}

            <form method="POST">
                <input name="nombre" placeholder="Nombre completo" required>
                <input name="email" type="email" placeholder="Correo electrónico" required>
                <input name="telefono" placeholder="Teléfono">
                <input name="direccion" placeholder="Dirección">
                <input name="empresa" placeholder="Empresa">
                <button type="submit">Guardar Información</button>
            </form>

        </div>

    </div>

</div>

</body>
</html>
